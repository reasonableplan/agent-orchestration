max_concurrent: 2  # 동시 실행 에이전트 수 제한

# timeout_seconds 기준:
# - batch 모드 (full skeleton 생성): architect/designer 600s 권장
# - compact prompt (skeleton 이미 채워진 후): orchestrator 300s 충분
# 메인 레포 개발자 환경: 이 값들로 충분. CI/느린 환경: 1.5배 권장.

architect:
  provider: claude-cli
  model: claude-opus-4-6
  prompt_path: agents/architect/CLAUDE.md
  timeout_seconds: 600
  on_timeout: retry
  max_retries_on_timeout: 1
  max_tokens: 8192

designer:
  provider: claude-cli
  model: claude-opus-4-6
  prompt_path: agents/designer/CLAUDE.md
  timeout_seconds: 600
  on_timeout: retry
  max_retries_on_timeout: 1
  max_tokens: 8192

orchestrator:
  provider: claude-cli
  model: claude-opus-4-6
  prompt_path: agents/orchestrator/CLAUDE.md
  timeout_seconds: 300
  on_timeout: retry
  max_retries_on_timeout: 2
  max_tokens: 8192

backend_coder:
  provider: claude-cli
  model: claude-sonnet-4-6
  prompt_path: agents/backend_coder/CLAUDE.md
  timeout_seconds: 600
  on_timeout: retry
  max_retries_on_timeout: 1
  max_tokens: 16384

frontend_coder:
  provider: claude-cli
  model: claude-haiku-4-5-20251001
  prompt_path: agents/frontend_coder/CLAUDE.md
  timeout_seconds: 600
  on_timeout: retry
  max_retries_on_timeout: 1
  max_tokens: 16384

reviewer:
  provider: claude-cli
  model: claude-opus-4-6
  prompt_path: agents/reviewer/CLAUDE.md
  timeout_seconds: 300
  on_timeout: escalate
  max_retries_on_timeout: 1
  max_tokens: 8192

qa:
  provider: claude-cli
  model: claude-opus-4-6
  prompt_path: agents/qa/CLAUDE.md
  timeout_seconds: 600
  on_timeout: retry
  max_retries_on_timeout: 1
  max_tokens: 8192
